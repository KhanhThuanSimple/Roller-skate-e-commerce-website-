<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"

<body>
    <div id="wrapper">


        <div class="login-container flex-colunm">

            <div class="mask"></div>
            <form action="post" class="flex-colunm">

                    <img src="./image/logo1.png" alt="logo">

                </div>
                <div>
                    <h2>Nhập OTP lấy lại mật khẩu</h2>
                </div>
                
                <div>
                    <input class="input-common" type="email" placeholder="Nhập OTP đã gửi đến email">
                </div>
                
                <div class="flex-center">

                    <button class="button-orange">Xác nhận</button>


                </div>
                <div class="flex-row"> 
                    
                    <a class="text-link flex-1" href="login.html"> Trở lại đăng nhập.</a>

        </div>
