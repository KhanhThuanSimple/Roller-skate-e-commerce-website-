<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div id="wrapper">


        <div class="login-container flex-colunm">
            <img class="img-banner"
                src="https://thegioipatin.cdn.vccloud.vn/wp-content/uploads/2024/06/448608953_859445002872088_8338426731773051141_n-scaled.jpg">
            <div class="mask"></div>
            <form action="post" class="flex-colunm">
                <div class="logo">
                    <img src="./image/logo1.png" alt="logo">

                </div>
                <div>
                    <h2>Đăng nhập</h2>
                </div>
                <div>
                    <input class="input-common" type="email" placeholder="Email">
                </div>
                <div>
                    <input class="input-common" type="password" placeholder="Mật khẩu">
                </div>
                <div class="flex-center">

                    <button  type="button" onclick="window.location.href='index.html'" class="button-orange">Đăng nhập</button>


                </div>
                <div class="flex-row"> 
                    <a class="text-link flex-1" href="forgot-password.html"> Quên mật khẩu?</a>
                    <a class="text-link flex-1" href="register.html"> Đăng kí tài khoản.</a>

                </div>

            </form>
        </div>

        <div id="footer">
            <p>CopyRight &copy;by NTN.vn</p>
        </div>
    </div>
</body>

</html>
