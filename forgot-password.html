<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div id="wrapper">


        <div class="login-container flex-colunm">
            <img class="img-banner"
                src="https://thegioipatin.cdn.vccloud.vn/wp-content/uploads/2024/06/448608953_859445002872088_8338426731773051141_n-scaled.jpg">
            <div class="mask"></div>
            <form action="post" class="flex-colunm">
                <div class="logo">
                    <img src="./image/logo1.png" alt="logo">

                </div>
                <div>
                    <h2>Quên mật khẩu</h2>
                </div>
                
                <div>
                    <input class="input-common" type="email" placeholder="Nhập email để lấy lại mật khẩu">
                </div>
                
                <div class="flex-center">
                    

                    <button  type="button" onclick="window.location.href='forgot-otp.html'" class="button-orange">Nhận OTP</button>


                </div>
                <div class="flex-row"> 
                    
                    <a class="text-link flex-1" href="login.html"> Trở lại đăng nhập.</a>

                </div>

            </form>
        </div>

        <footer id="footer">
            <div class="footer-container">
                <div class="footer-section">
                    <h4>Chính sách</h4>
                    <p>Chính sách chăm sóc khách hàng.<br>Chính sách đổi trả.<br>Chính sách thanh toán.</p>
                </div>
                <div class="footer-section">
                    <h4>Liên hệ:</h4>
                    <p>Email: NTN@company.com</p>
                    <p>Điện thoại: 123-456-789</p>
                </div>
                <div class="footer-section">
                    <h4>Theo dõi chúng tôi</h4>
                    <div class="social-link">
                        <p><a href="https://www.facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i></a></p>
                        <p><a href="https://www.twitter.com" target="_blank"><i class="fa-brands fa-twitter"></i></a></p>
                        <p><a href="https://www.instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a></p>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</body>

</html>
